<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gestión de Actividades — Carlos Velástegui</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F0;--surface:#FFFFFF;--border:#E2E0D8;--text:#1A1916;--muted:#8A887E;--accent:#1A5276;--accent-light:#E8F2EE;--accent-text:#1A4D3E;--danger:#C0392B;--danger-light:#FDECEC;--warning:#D4770A;--warning-light:#FEF3E2;--success:#1A6B3E;--success-light:#E8F5EE;--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--accent);color:white;padding:1rem 1.25rem;position:sticky;top:0;z-index:200}
.header h1{font-size:17px;font-weight:600}.header-sub{font-size:11px;opacity:0.7;margin-top:2px}
.tab-bar{background:var(--accent);display:flex;padding:0 0.5rem;border-bottom:1px solid rgba(255,255,255,0.15);overflow-x:auto}
.tab{flex:1;min-width:70px;padding:9px 4px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:color 0.2s;white-space:nowrap}
.tab svg{width:18px;height:18px}.tab.active{color:white}
.tab.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:white;border-radius:2px 2px 0 0}
.content{padding:1rem;max-width:900px;margin:0 auto}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:1rem}
/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.filter{padding:7px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;cursor:pointer}
.filter:focus{border-color:var(--accent)}
/* ACTIVITY ITEMS */
.act-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.2s}
.act-item:hover{border-color:var(--accent)}
.act-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.act-title{font-weight:600;font-size:14px;flex:1}
.act-meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.act-meta span{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:2px 8px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-pendiente{background:#FEF3E2;color:#D4770A}
.b-en-curso{background:#EEF2FF;color:#4338CA}
.b-en-pausa{background:#F3F4F6;color:#6B7280}
.b-terminado{background:var(--accent-light);color:var(--accent-text)}
.plazo-retrasado{color:var(--danger);font-size:11px;font-weight:600}
.plazo-por-vencer{color:var(--warning);font-size:11px;font-weight:600}
.plazo-ok{color:var(--success);font-size:11px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.field{margin-bottom:1rem}.field:last-child{margin-bottom:0}
.lbl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.fs{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.15s;-webkit-appearance:none}
.fs:focus{border-color:var(--accent);background:white}
textarea.fs{resize:vertical;min-height:70px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
/* NOTAS */
.notas-section{background:var(--bg);border-radius:var(--radius-sm);padding:1rem;margin-top:1rem}
.notas-section h4{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem}
.nota-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;font-size:13px;line-height:1.5;white-space:pre-wrap}
.nota-fecha{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
.add-nota{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.add-nota textarea{min-height:60px}
/* BUTTONS */
.btn{padding:11px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;border:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:white;flex:1}
.btn-secondary{background:var(--bg);border:1px solid var(--border);color:var(--text);flex:1}
.btn-success{background:var(--success-light);color:var(--success);border:1px solid #B8D8CC;flex:1}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #F5C0BA;padding:8px 12px;font-size:13px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;flex-shrink:0}
/* ALERTS TAB */
.alerta-item{border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;font-size:13px}
.alerta-roja{background:var(--danger-light);border:1px solid #F5C0BA;color:var(--danger)}
.alerta-naranja{background:var(--warning-light);border:1px solid #F5D8A0;color:var(--warning)}
/* INFORME */
.informe-preview{background:white;border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;margin-top:1rem}
/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--accent);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:500;display:none;max-width:90%;text-align:center}
#toast.show{display:block}
#toast.error{background:var(--danger)}
/* API CONFIG */
.api-config{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;margin-bottom:1rem}
.api-config h4{font-size:13px;font-weight:600;margin-bottom:0.75rem}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem 0;color:var(--muted);font-size:14px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:600;color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px}
</style>
</head>

<!-- API CONFIG -->
<div id="apiConfig" class="api-config" style="display:none">
  <h4>⚙️ Configuración de API</h4>
  <div class="field"><label class="lbl">URL del Apps Script</label>
    <input type="url" id="apiUrlInput" class="fs" placeholder="https://script.google.com/macros/s/...">
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" onclick="guardarUrl()">Guardar</button>
    <button class="btn btn-secondary" onclick="toggleConfig()">Cancelar</button>
  </div>
</div>

<!-- TAB LISTA -->
<div id="tabLista">
  <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
    <select class="filter" id="filtroMes" onchange="renderLista()"><option value="">Todos los meses</option></select>
    <select class="filter" id="filtroEstado" onchange="renderLista()">
      <option value="">Todos los estados</option>
      <option value="Pendiente">⏳ Pendiente</option>
      <option value="En Curso">🔄 En Curso</option>
      <option value="En Pausa">⏸ En Pausa</option>
      <option value="Terminado">✅ Terminado</option>
    </select>
    <select class="filter" id="filtroPlazo" onchange="renderLista()">
      <option value="">Todos los plazos</option>
      <option value="retrasado">❌ Retrasado — fecha vencida</option>
      <option value="por_vencer">⚠️ Por vencer — menos de 7 días</option>
      <option value="a_tiempo">🟢 A tiempo — más de 7 días</option>
    </select>
    <input type="text" id="filtroTexto" class="filter" placeholder="🔍 Buscar..." oninput="renderLista()" style="min-width:150px;flex:1">
  </div>
  <div id="statsBar" class="stat-grid"></div>
  <button class="btn btn-primary" onclick="openModal('add',null)" style="margin-bottom:1rem;width:100%">+ Nueva actividad</button>
  <div id="listaActividades"></div>
</div>

<!-- TAB ALERTAS -->
<div id="tabAlertas" style="display:none">
  <div id="alertasContent"></div>
</div>

<!-- TAB INFORME -->
<div id="tabInforme" style="display:none">
  <div class="card">
    <div class="card-title">Generar informe</div>
    <div class="row-2" style="margin-bottom:0.75rem">
      <div class="field">
        <label class="lbl">Mes</label>
        <select class="fs" id="mesSel" onchange="previsualizarInforme()">
          <option value="TODOS">📊 Todos los meses</option>
        </select>
      </div>
      <div class="field">
        <label class="lbl">Estado</label>
        <select class="fs" id="estadoSel" onchange="previsualizarInforme()">
          <option value="TODOS">Todos los estados</option>
          <option value="Terminado">✅ Terminado</option>
          <option value="En Curso">🔄 En Curso</option>
          <option value="En Pausa">⏸ En Pausa</option>
          <option value="Pendiente">⏳ Pendiente</option>
          <option value="Retrasado">❌ Retrasado — fecha vencida sin terminar</option>
          <option value="Por vencer">⚠️ Por vencer — vence en 7 días o menos</option>
          <option value="A tiempo">🟢 A tiempo — más de 7 días para vencer</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="previsualizarInforme()">👁 Vista previa</button>
      <button class="btn btn-success" onclick="descargarInforme()">⬇ Descargar HTML</button>

      <button class="btn-icon" onclick="closeModal()" style="font-size:20px;color:var(--muted)">✕</button>
    </div>
    <div class="row-2">
      <div class="field"><label class="lbl">Mes</label>
        <select class="fs" id="fMes"></select>
      </div>
      <div class="field"><label class="lbl">Ubicación</label>
        <input type="text" class="fs" id="fUbicacion" placeholder="ROSAPRIMA, R7...">
      </div>
    </div>
    <div class="row-2">
      <div class="field"><label class="lbl">Área</label>
        <input type="text" class="fs" id="fArea" placeholder="Operaciones, Nómina...">
      </div>
      <div class="field"><label class="lbl">Tipo de ejecución</label>
        <select class="fs" id="fTipo">
          <option value="Correo electrónico">📧 Correo electrónico</option>
          <option value="Excel">📊 Excel</option>
          <option value="Web">🌐 Web</option>
          <option value="Presencial">🤝 Presencial</option>
          <option value="Ninguno">— Ninguno</option>
        </select>
      </div>
    </div>
    <div class="field"><label class="lbl">Título *</label>
      <input type="text" class="fs" id="fTitulo" placeholder="Nombre de la actividad">
    </div>
    <div class="field"><label class="lbl">Detalle / Descripción</label>
      <textarea class="fs" id="fDetalle" rows="3" placeholder="Descripción del objetivo..."></textarea>
    </div>
    <div class="row-2">
      <div class="field"><label class="lbl">Estado</label>
        <select class="fs" id="fEstado">
          <option value="Pendiente">⏳ Pendiente</option>
          <option value="En Curso">🔄 En Curso</option>
          <option value="En Pausa">⏸ En Pausa</option>
          <option value="Terminado">✅ Terminado</option>
        </select>
      </div>
      <div class="field"></div>
    </div>
    <div class="row-2">
      <div class="field"><label class="lbl">Fecha de inicio</label><input type="date" class="fs" id="fFechaInicio"></div>
      <div class="field"><label class="lbl">Fecha máxima</label><input type="date" class="fs" id="fFechaMaxima"></div>
    </div>
    <div id="notasSection" class="notas-section" style="display:none">
      <h4>📝 Notas de seguimiento</h4>
      <div id="notasLista"></div>
      <div class="add-nota">
        <textarea class="fs" id="nuevaNota" placeholder="Agrega una nota de seguimiento..."></textarea>
        <button class="btn btn-success" onclick="agregarNota()" style="align-self:flex-end;flex:0;padding:10px 20px">Agregar nota</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="guardarActividad()">💾 Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
let API_URL = localStorage.getItem('activ_api_url_v2') || '';
let actividades = [];
let editId = null;
let activeTab = 'lista';
let saving = false;
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const mesActual = MESES[new Date().getMonth()];

// ─── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Poblar select de mes en el modal
  const fMes = document.getElementById('fMes');
  MESES.forEach(m => { const o = document.createElement('option'); o.value = o.textContent = m; fMes.appendChild(o); });
  if (API_URL) cargarActividades();
});

// ─── API ───────────────────────────────────────────────────────────────────
async function apiCall(params) {
  if (!API_URL) { toast('⚠️ Configura la URL de la API primero', true); return null; }
  try {
    const qs = Object.entries(params).filter(([,v])=>v!==undefined&&v!==null).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const r = await fetch(API_URL + '?' + qs);
    return await r.json();
  } catch(e) { toast('❌ Error de conexión', true); return null; }
}

async function cargarActividades() {
  const lista = document.getElementById('listaActividades');
  lista.innerHTML = '<div class="empty"><span class="spinner"></span> Cargando...</div>';
  const res = await apiCall({ action: 'list' });
  if (!res || !res.success) { lista.innerHTML = '<div class="empty">Sin conexión. Verifica la URL.</div>'; return; }
  actividades = res.data || [];
  renderLista();
  poblarFiltros();
  poblarInformeMeses();
  if (activeTab === 'alertas') renderAlertas();
  if (activeTab === 'informe') previsualizarInforme();
}

// ─── PLAZO ─────────────────────────────────────────────────────────────────
function getPlazo(a) {
  if (a.Estado === 'Terminado') return { type: 'completado', label: '', dias: 0 };
  if (!a.FechaMaxima) return { type: 'sin_fecha', label: '', dias: 0 };
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const max = new Date(a.FechaMaxima + 'T00:00:00');
  const dias = Math.ceil((max - hoy) / 86400000);
  if (dias < 0) return { type: 'retrasado', label: `❌ ${Math.abs(dias)}d vencida`, dias };
  if (dias <= 7) return { type: 'por_vencer', label: `⚠️ Vence en ${dias}d`, dias };
  return { type: 'a_tiempo', label: `🟢 ${dias}d restantes`, dias };
}

// ─── RENDER LISTA ──────────────────────────────────────────────────────────
function renderLista() {
  const mes = document.getElementById('filtroMes').value;
  const estado = document.getElementById('filtroEstado').value;
  const plazo = document.getElementById('filtroPlazo').value;
  const txt = (document.getElementById('filtroTexto').value || '').toLowerCase();

  let data = actividades.filter(a => {
    if (mes && a.Mes !== mes) return false;
    if (estado && a.Estado !== estado) return false;
    if (plazo && getPlazo(a).type !== plazo) return false;
    if (txt && !(a.Titulo||'').toLowerCase().includes(txt) && !(a.Area||'').toLowerCase().includes(txt) && !(a.Ubicacion||'').toLowerCase().includes(txt)) return false;
    return true;
  });

  // Stats bar
  const total = data.length;
  const terminadas = data.filter(a=>a.Estado==='Terminado').length;
  const retrasadas = data.filter(a=>getPlazo(a).type==='retrasado').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--success)">${terminadas}</div><div class="stat-lbl">Terminadas</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--danger)">${retrasadas}</div><div class="stat-lbl">Retrasadas</div></div>
  `;

  if (!data.length) { document.getElementById('listaActividades').innerHTML = '<div class="empty">Sin actividades</div>'; return; }

  const estadoBadge = e => {
    const m = {'Pendiente':'b-pendiente','En Curso':'b-en-curso','En Pausa':'b-en-pausa','Terminado':'b-terminado'};
    return `<span class="badge ${m[e]||'b-pendiente'}">${e}</span>`;
  };

  document.getElementById('listaActividades').innerHTML = data.map(a => {
    const p = getPlazo(a);
    const plazoHtml = p.label ? `<span class="${p.type==='retrasado'?'plazo-retrasado':p.type==='por_vencer'?'plazo-por-vencer':'plazo-ok'}">${p.label}</span>` : '';
    const notasCount = a.Notas ? a.Notas.split('\n---\n').filter(Boolean).length : 0;
    return `<div class="act-item" onclick="openModal('edit','${a.ID}')">
      <div class="act-header">
        <div class="act-title">${a.Titulo||''}</div>
        ${estadoBadge(a.Estado||'Pendiente')}
      </div>
      <div class="act-meta">
        <span>${a.Ubicacion||'—'}</span><span>${a.Area||'—'}</span>
        ${a.FechaMaxima?`<span>📅 ${fmtDate(a.FechaMaxima)}</span>`:''}
        ${notasCount?`<span>📝 ${notasCount} nota${notasCount>1?'s':''}</span>`:''}
      </div>
      ${plazoHtml}
    </div>`;
  }).join('');
}

function poblarFiltros() {
  const meses = [...new Set(actividades.map(a=>a.Mes).filter(Boolean))].sort((a,b)=>MESES.indexOf(a)-MESES.indexOf(b));
  const sel = document.getElementById('filtroMes');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos los meses</option>' + meses.map(m=>`<option value="${m}">${m}</option>`).join('');
  if (cur) sel.value = cur;
}

function poblarInformeMeses() {
  const meses = [...new Set(actividades.map(a=>a.Mes).filter(Boolean))].sort((a,b)=>MESES.indexOf(a)-MESES.indexOf(b));
  const sel = document.getElementById('mesSel');
  const cur = sel.value;
  sel.innerHTML = '<option value="TODOS">📊 Todos los meses</option>' + meses.map(m=>`<option value="${m}">${m}</option>`).join('');
  if (cur && (cur==='TODOS' || meses.includes(cur))) sel.value = cur;
}

// ─── MODAL ─────────────────────────────────────────────────────────────────
function openModal(mode, id) {
  editId = (mode !== 'add') ? id : null;
  document.getElementById('modalTitle').textContent = mode==='add'?'Nueva actividad':mode==='notas'?'Notas de seguimiento':'Editar actividad';
  document.getElementById('notasSection').style.display = (mode==='edit'||mode==='notas') ? '' : 'none';

  if (mode === 'add') {
    ['fUbicacion','fArea','fTitulo','fDetalle'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('fMes').value = mesActual;
    document.getElementById('fTipo').value = 'Ninguno';
    document.getElementById('fEstado').value = 'Pendiente';
    document.getElementById('fFechaInicio').value = today();
    document.getElementById('fFechaMaxima').value = '';
  } else {
    const a = actividades.find(x=>x.ID===id);
    if (!a) return;
    document.getElementById('fMes').value = a.Mes || mesActual;
    document.getElementById('fUbicacion').value = a.Ubicacion || '';
    document.getElementById('fArea').value = a.Area || '';
    document.getElementById('fTitulo').value = a.Titulo || '';
    document.getElementById('fTipo').value = a.TipoEjecucion || 'Ninguno';
    document.getElementById('fEstado').value = a.Estado || 'Pendiente';
    document.getElementById('fDetalle').value = a.Detalle || '';
    // *** FIX: siempre cargar las fechas existentes ***
    document.getElementById('fFechaInicio').value = a.FechaInicio || '';
    document.getElementById('fFechaMaxima').value = a.FechaMaxima || '';
    renderNotasModal(a);
    if (mode === 'notas') setTimeout(()=>document.getElementById('notasSection').scrollIntoView({behavior:'smooth',block:'start'}),200);
  }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderNotasModal(a) {
  const notas = (a.Notas||'').split('\n---\n').filter(Boolean);
  document.getElementById('notasLista').innerHTML = notas.length
    ? notas.map(n=>{
        const m = n.match(/^\[(\d{4}-\d{2}-\d{2})\] ([\s\S]*)$/);
        return m ? `<div class="nota-item"><div class="nota-fecha">📅 ${fmtDate(m[1])}</div>${m[2]}</div>`
                 : `<div class="nota-item">${n}</div>`;
      }).join('')
    : '<p style="font-size:12px;color:var(--muted)">Sin notas aún</p>';
  document.getElementById('nuevaNota').value = '';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  editId = null;
}

// ─── GUARDAR ───────────────────────────────────────────────────────────────
async function guardarActividad() {
  if (saving) return;
  const titulo = document.getElementById('fTitulo').value.trim();
  if (!titulo) { toast('⚠️ El título es obligatorio', true); return; }
  saving = true;
  document.getElementById('btnGuardar').textContent = 'Guardando...';

  const params = {
    action: editId ? 'update' : 'create',
    Mes: document.getElementById('fMes').value,
    Ubicacion: document.getElementById('fUbicacion').value.trim(),
    Area: document.getElementById('fArea').value.trim(),
    Titulo: titulo,
    TipoEjecucion: document.getElementById('fTipo').value,
    Estado: document.getElementById('fEstado').value,
    Detalle: document.getElementById('fDetalle').value.trim(),
    FechaInicio: document.getElementById('fFechaInicio').value,
    FechaMaxima: document.getElementById('fFechaMaxima').value,
  };
  if (editId) params.ID = editId;

  const res = await apiCall(params);
  saving = false;
  document.getElementById('btnGuardar').textContent = '💾 Guardar';
  if (!res || !res.success) { toast('❌ Error al guardar', true); return; }
  toast(editId ? '✅ Actividad actualizada' : '✅ Actividad creada');
  closeModal();
  await cargarActividades();
}

async function agregarNota() {
  const nota = document.getElementById('nuevaNota').value.trim();
  if (!nota || !editId) { toast('⚠️ Escribe una nota', true); return; }
  const res = await apiCall({ action: 'addNota', ID: editId, nota });
  if (!res || !res.success) { toast('❌ Error al agregar nota', true); return; }
  toast('📝 Nota agregada');
  await cargarActividades();
  const act = actividades.find(a=>a.ID===editId);
  if (act) renderNotasModal(act);
}

// ─── ALERTAS ───────────────────────────────────────────────────────────────
function renderAlertas() {
  const retrasadas = actividades.filter(a=>getPlazo(a).type==='retrasado');
  const porVencer = actividades.filter(a=>getPlazo(a).type==='por_vencer');
  let html = '';
  if (!retrasadas.length && !porVencer.length) {
    html = '<div class="empty">✅ Sin alertas pendientes</div>';
  } else {
    if (retrasadas.length) {
      html += `<div class="card-title" style="margin-bottom:0.5rem">❌ Retrasadas (${retrasadas.length})</div>`;
      html += retrasadas.map(a=>`<div class="alerta-item alerta-roja" onclick="openModal('edit','${a.ID}')" style="cursor:pointer">
        <strong>${a.Titulo}</strong><br>
        <span style="font-size:12px">${a.Ubicacion||''} · ${a.Area||''} · Venció el ${fmtDate(a.FechaMaxima)}</span>
      </div>`).join('');
    }
    if (porVencer.length) {
      html += `<div class="card-title" style="margin:1rem 0 0.5rem">⚠️ Por vencer esta semana (${porVencer.length})</div>`;
      html += porVencer.map(a=>`<div class="alerta-item alerta-naranja" onclick="openModal('edit','${a.ID}')" style="cursor:pointer">
        <strong>${a.Titulo}</strong><br>
        <span style="font-size:12px">${a.Ubicacion||''} · ${a.Area||''} · Vence el ${fmtDate(a.FechaMaxima)}</span>
      </div>`).join('');
    }
  }
  document.getElementById('alertasContent').innerHTML = html;
}

// ─── INFORME ───────────────────────────────────────────────────────────────
function getDatosInforme() {
  const mes = document.getElementById('mesSel')?.value || 'TODOS';
  const estado = document.getElementById('estadoSel')?.value || 'TODOS';
  let data = mes === 'TODOS' ? [...actividades] : actividades.filter(a=>a.Mes===mes);
  if (estado === 'Retrasado') data = data.filter(a=>getPlazo(a).type==='retrasado');
  else if (estado === 'Por vencer') data = data.filter(a=>getPlazo(a).type==='por_vencer');
  else if (estado === 'A tiempo') data = data.filter(a=>getPlazo(a).type==='a_tiempo');
  else if (estado !== 'TODOS') data = data.filter(a=>a.Estado===estado);
  return { data, mes, estado };
}

function previsualizarInforme() {
  const { data, mes } = getDatosInforme();
  const fecha = new Date().toLocaleDateString('es-EC', {day:'2-digit',month:'long',year:'numeric'});
  const total = data.length;
  const terminadas = data.filter(a=>a.Estado==='Terminado').length;
  const enCurso = data.filter(a=>a.Estado==='En Curso').length;
  const pendiente = data.filter(a=>a.Estado==='Pendiente').length;
  const retrasadas = data.filter(a=>getPlazo(a).type==='retrasado').length;

  const pct = n => total > 0 ? Math.round(n/total*100) : 0;
  const bar = (n,color) => `<div style="height:8px;border-radius:4px;background:${color};width:${pct(n)}%;min-width:${n>0?'4px':'0'};transition:width 0.3s"></div>`;

  const areas = {};
  data.forEach(a => { areas[a.Area||'Sin área'] = (areas[a.Area||'Sin área']||0)+1; });

  const tablaAreas = Object.entries(areas).sort((a,b)=>b[1]-a[1]).map(([area,cnt])=>
    `<tr><td style="padding:6px 8px;border-bottom:1px solid #E2E0D8">${area}</td>
     <td style="padding:6px 8px;border-bottom:1px solid #E2E0D8;text-align:right;font-weight:600">${cnt}</td>
     <td style="padding:6px 8px;border-bottom:1px solid #E2E0D8;text-align:right;color:#8A887E">${pct(cnt)}%</td></tr>`
  ).join('');

  const html = `<div style="font-family:'DM Sans',sans-serif;max-width:700px;margin:0 auto;background:white;padding:2rem;border:1px solid #E2E0D8;border-radius:12px">
    <div style="background:#1A4D3E;color:white;padding:1.5rem;border-radius:8px;margin-bottom:1.5rem">
      <h1 style="font-size:18px;font-weight:600;margin:0">📋 Informe ${mes==='TODOS'?'General — Todos los meses':'Mensual — '+mes}</h1>
      <p style="font-size:12px;opacity:0.7;margin-top:6px">Carlos Velástegui · Generado el ${fecha}</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem">
      ${[['Total',total,'#1A4D3E'],['Terminadas',terminadas,'#1A6B3E'],['En Curso',enCurso,'#4338CA'],['Retrasadas',retrasadas,'#C0392B']].map(([l,v,c])=>
        `<div style="background:#F5F4F0;border-radius:8px;padding:12px;text-align:center">
          <div style="font-size:24px;font-weight:700;color:${c}">${v}</div>
          <div style="font-size:10px;color:#8A887E;text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">${l}</div>
        </div>`).join('')}
    </div>
    <div style="margin-bottom:1.5rem">
      <h3 style="font-size:13px;font-weight:600;color:#8A887E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Distribución por estado</h3>
      ${[['✅ Terminado',terminadas,'#1A4D3E'],['🔄 En Curso',enCurso,'#4338CA'],['⏳ Pendiente',pendiente,'#D4770A'],['❌ Retrasado',retrasadas,'#C0392B']].map(([l,v,c])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:120px;font-size:12px">${l}</div>
          <div style="flex:1;background:#E2E0D8;border-radius:4px;height:8px">${bar(v,c)}</div>
          <div style="width:50px;text-align:right;font-size:12px;font-weight:600;color:${c}">${v} (${pct(v)}%)</div>
        </div>`).join('')}
    </div>
    <div style="margin-bottom:1.5rem">
      <h3 style="font-size:13px;font-weight:600;color:#8A887E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Por área</h3>
      <table style="width:100%;border-collapse:collapse;font-size:13px">${tablaAreas}</table>
    </div>
    <div>
      <h3 style="font-size:13px;font-weight:600;color:#8A887E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Detalle de actividades</h3>
      ${data.map(a=>{
        const notas = (a.Notas||'').split('\n---\n').filter(Boolean);
        const ultimaNota = notas.length ? notas[notas.length-1].replace(/^\[\d{4}-\d{2}-\d{2}\] /,'') : '';
        return `<div style="border:1px solid #E2E0D8;border-radius:8px;padding:12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <strong style="font-size:13px">${a.Titulo||''}</strong>
            <span style="font-size:11px;font-weight:600;white-space:nowrap;color:${a.Estado==='Terminado'?'#1A4D3E':a.Estado==='En Curso'?'#4338CA':'#D4770A'}">${a.Estado||''}</span>
          </div>
          <div style="font-size:12px;color:#8A887E;margin-top:4px">${a.Ubicacion||''} · ${a.Area||''} · ${a.TipoEjecucion||''}</div>
          ${a.FechaMaxima?`<div style="font-size:12px;color:#8A887E">Fecha máx: ${fmtDate(a.FechaMaxima)}</div>`:''}
          ${ultimaNota?`<div style="font-size:12px;color:#1A1916;margin-top:6px;background:#F5F4F0;padding:6px 8px;border-radius:4px">📝 ${ultimaNota}</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;

  document.getElementById('informePreview').innerHTML = `<div style="margin-top:1rem">${html}</div>`;
}

function descargarInforme() {
  const { mes, estado } = getDatosInforme();
  const preview = document.getElementById('informePreview').innerHTML;
  const blob = new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Informe ${mes}</title></head><body>${preview}
<div style="background:#F5F4F0;border-top:1px solid #E2E0D8;padding:1.5rem 1rem;text-align:center;margin-top:2rem">
  <div style="font-size:11px;color:#8A887E;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Elaborado por</div>
  <div style="font-size:15px;font-weight:700;color:#1A5276">Ing. Carlos Velástegui</div>

// ─── TABS ─────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabLista').style.display = tab==='lista' ? '' : 'none';
  document.getElementById('tabAlertas').style.display = tab==='alertas' ? '' : 'none';
  document.getElementById('tabInforme').style.display = tab==='informe' ? '' : 'none';
  if (tab==='alertas') renderAlertas();
  if (tab==='informe') previsualizarInforme();
}

// ─── CONFIG ────────────────────────────────────────────────────────────────
function toggleConfig() {
  const el = document.getElementById('apiConfig');
  el.style.display = el.style.display === 'none' ? '' : 'none';
  document.getElementById('apiUrlInput').value = API_URL;
}

function guardarUrl() {
  const url = document.getElementById('apiUrlInput').value.trim();
  if (!url) { toast('⚠️ Ingresa una URL', true); return; }
  API_URL = url;
  localStorage.setItem('activ_api_url_v2', API_URL);
  document.getElementById('apiConfig').style.display = 'none';
  toast('✅ URL guardada');
  cargarActividades();
}

// ─── UTILS ─────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d+'T00:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}); }
  catch(e) { return d; }
}
let toastTimer;
function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError?' error':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.className='', 3000);
}
</script>
